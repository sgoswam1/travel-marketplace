version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:15\n    container_name: travel_marketplace_db\n    environment:\n      POSTGRES_DB: travel_marketplace\n      POSTGRES_USER: ${DB_USER}\n      POSTGRES_PASSWORD: ${DB_PASSWORD}\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n    healthcheck:\n      test: ["CMD", "pg_isready", "-U", "${DB_USER}"]\n      interval: 30s\n      timeout: 10s\n      retries: 5\n\n  redis:\n    image: redis:7\n    container_name: travel_marketplace_redis\n    volumes:\n      - redis_data:/data\n    healthcheck:\n      test: ["CMD", "redis-cli", "ping"]\n      interval: 30s\n      timeout: 10s\n      retries: 5\n\n  api:\n    image: your-aspnet-core-api-image\n    container_name: travel_marketplace_api\n    build:\n      context: ./Api\n      dockerfile: Dockerfile\n    environment:\n      ConnectionStrings__DefaultConnection: "Host=postgres;Database=travel_marketplace;Username=${DB_USER};Password=${DB_PASSWORD}"\n      JWT_SECRET: ${JWT_SECRET}\n    ports:\n      - "5000:80"\n    depends_on:\n      - postgres\n    healthcheck:\n      test: ["CMD", "curl", "-f", "http://localhost:80/health"]\n      interval: 30s\n      timeout: 10s\n      retries: 5\n    volumes:\n      - ./Api:/app\n      - /app/bin\n      - /app/obj\n\n  frontend:\n    image: your-react-node-image\n    container_name: travel_marketplace_frontend\n    build:\n      context: ./Frontend\n      dockerfile: Dockerfile\n    ports:\n      - "3000:3000"\n    depends_on:\n      - api\n    healthcheck:\n      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]\n      interval: 30s\n      timeout: 10s\n      retries: 5\n    volumes:\n      - ./Frontend:/app\n\nvolumes:\n  postgres_data:\n  redis_data: